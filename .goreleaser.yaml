version: 2

project_name: tgsort

before:
  hooks:
    - go mod tidy

builds:
  - id: tgsort
    main: .
    binary: tgsort
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/salemgolemugoo/tgsort/cmd.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^chore\\(release\\):"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

brews:
  - name: tgsort
    repository:
      owner: salemgolemugoo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/salemgolemugoo/tgsort"
    description: "Sort blocks and attributes in Terragrunt HCL files"
    license: "Apache-2.0"
    install: |
      bin.install "tgsort"
    test: |
      system "#{bin}/tgsort", "--version"
